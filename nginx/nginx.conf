server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name uelement.in www.uelement.in;

    # Allow HTTP-01 challenges for renewals
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
    }

    return 301 https://$host$request_uri;
}

# HTTPS vhost
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name uelement.in www.uelement.in;

    # Your app root (adjust if different)
    root /opt/codedeploy/uelement/staging/out;
    index index.html index.htm;
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }
    # Certbot-managed certificate for uelement.in
    ssl_certificate     /etc/letsencrypt/live/uelement.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uelement.in/privkey.pem;

    # (Good defaults)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}