# Build Next.js static export and prepare artifacts for CodeDeploy to EC2 (Nginx static hosting)
version: 0.2

env:
  variables:
    NODE_ENV: "production"
    APP_NAME: "uelement"                   # used for target folder names on EC2
    DIST_DIR: "out"                        # Next.js static export output

phases:
  install:
    commands:
      # Build and install Node.js from source to ensure >=20.18 on AL2 (avoids glibc mismatch)
      - export NODE_VERSION=22.11.0
      - yum install -y gcc-c++ make python3 tar xz
      - curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}.tar.xz" -o /tmp/node.tar.xz
      - mkdir -p /tmp/node-src && tar -xJf /tmp/node.tar.xz -C /tmp/node-src --strip-components=1
      - cd /tmp/node-src && ./configure --prefix=/opt/nodejs && make -j"$(nproc)" && make install
      - export PATH="/opt/nodejs/bin:${PATH}"
      - node -v

      # Fresh dependency install with the new Node.js version
      - echo "Forcing clean npm install (removing node_modules and package-lock.json)"
      - rm -rf node_modules package-lock.json
      - echo "Running npm install (verbose)"
      - npm install --include=dev --no-audit --no-fund --verbose --unsafe-perm

      # Explicitly install the platform-specific rollup native package and fail if it cannot be installed
      - echo "Installing @rollup/rollup-linux-x64-gnu@4.52.3"
      - npm i --no-audit --no-fund @rollup/rollup-linux-x64-gnu@4.52.3 --no-save --verbose --unsafe-perm
      - npm ci


  build:
    commands:
      - echo "Building static Next.js export to ${DIST_DIR}/"
      - npm run build
      # Verify build output
      - ls -la "$DIST_DIR" || (echo "$DIST_DIR/ was not created"; exit 2)
  post_build:
    commands:
      - echo "Build complete, preparing artifacts for CodeDeploy..."
      # Optionally validate the build output
      - ls -la "$DIST_DIR"

artifacts:
  files:
    # CodeDeploy manifest & scripts
    - appspec.yaml
    - scripts/**/*
    # Nginx site config (optional but recommended)
    - nginx/nginx.conf
    # Built site
    - out/**/*      # <- ensure this matches DIST_DIR above
  discard-paths: no
