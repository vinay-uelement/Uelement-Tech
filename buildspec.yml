# Build Next.js static export and prepare artifacts for CodeDeploy to EC2 (Nginx static hosting)
version: 0.2

env:
  variables:
    NODE_ENV: "production"
    APP_NAME: "uelement"                   # used for target folder names on EC2
    DIST_DIR: "out"                        # Next.js static export output

phases:
  install:
    commands:
      - |
        # Ensure Node.js >=20; prefer musl build (works on AL2 without newer glibc)
        export NODE_VERSION=20.18.0
        if ! command -v node >/dev/null 2>&1 || [ "$(node -p "process.versions.node.split('.')[0]")" -lt 20 ]; then
          echo "Installing Node.js ${NODE_VERSION} (musl binary preferred)..."
          mkdir -p /opt/nodejs
          if curl -fL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64-musl.tar.xz" -o /tmp/node.tar.xz; then
            tar -xJf /tmp/node.tar.xz -C /opt/nodejs --strip-components=1
          elif curl -fL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz; then
            tar -xJf /tmp/node.tar.xz -C /opt/nodejs --strip-components=1
          else
            echo "Failed to download Node.js ${NODE_VERSION} tarball"; exit 1
          fi
        fi
      - export PATH="/opt/nodejs/bin:${PATH}"
      - node -v
      - npm -v
      - echo "Installing npm dependencies from package-lock"
      - npm ci --include=dev --no-audit --no-fund --unsafe-perm
  build:
    commands:
      - echo "Building static Next.js export to ${DIST_DIR}/"
      - npm run build
      # Verify build output
      - ls -la "$DIST_DIR" || (echo "$DIST_DIR/ was not created"; exit 2)
  post_build:
    commands:
      - echo "Build complete, preparing artifacts for CodeDeploy..."
      # Optionally validate the build output
      - ls -la "$DIST_DIR"

artifacts:
  files:
    # CodeDeploy manifest & scripts
    - appspec.yaml
    - scripts/**/*
    # Nginx site config (optional but recommended)
    - nginx/nginx.conf
    # Built site
    - out/**/*      # <- ensure this matches DIST_DIR above
  discard-paths: no
